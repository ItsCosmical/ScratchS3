<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scratch Mesh Data Packer</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: #ddd; padding: 20px; }
        .card { max-width: 900px; margin: auto; background: #2d2d2d; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; color: #aaa; }
        textarea { width: 100%; height: 120px; background: #111; color: #40f0ff; border: 1px solid #444; font-family: 'Courier New', monospace; font-size: 12px; padding: 10px; resize: vertical; }
        input, button { padding: 10px; border-radius: 5px; border: 1px solid #444; background: #3d3d3d; color: white; width: 100%; box-sizing: border-box; }
        button { background: #007bff; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.2s; }
        button:hover { background: #0056b3; }
        h2 { margin-top: 0; color: #fff; border-bottom: 2px solid #444; padding-bottom: 10px; }
        .full { grid-column: 1 / span 2; }
    </style>
</head>
<body>

<div class="card">
    <h2>Mesh to List Converter</h2>
    <div class="grid">
        <div>
            <label>Select .OBJ File</label>
            <input type="file" id="fileInput" accept=".obj">
        </div>
        <div>
            <label>Mesh Name (for 'meshes' list)</label>
            <input type="text" id="meshName" value="myModel">
        </div>
        <div class="full">
            <button onclick="processMesh()">GENERATE LIST DATA</button>
        </div>
    </div>

    <div class="grid">
        <div class="full">
            <label>1. Add to <b>meshData</b> (Import this string into the list)</label>
            <textarea id="outMeshData" readonly></textarea>
        </div>
        <div>
            <label>2. Add to <b>vertX, vertY, vertZ</b></label>
            <textarea id="outVerts" readonly placeholder="Values for vertX, Y, and Z lists..."></textarea>
        </div>
        <div>
            <label>3. Add to <b>triVertIndexA, B, C</b></label>
            <textarea id="outTris" readonly placeholder="Indices for triangle lists..."></textarea>
        </div>
    </div>
</div>

<script>
function processMesh() {
    const fileInput = document.getElementById('fileInput');
    if (!fileInput.files[0]) return alert("Select a file!");

    const reader = new FileReader();
    reader.onload = function(e) {
        const lines = e.target.result.split('\n');
        const vX = [], vY = [], vZ = [];
        const tA = [], tB = [], tC = [];
        let triCount = 0;

        lines.forEach(line => {
            const p = line.trim().split(/\s+/);
            if (p[0] === 'v') {
                vX.push(parseFloat(p[1]));
                vY.push(parseFloat(p[2]));
                vZ.push(parseFloat(p[3]));
            } else if (p[0] === 'f') {
                const idx = p.slice(1).map(x => parseInt(x.split('/')[0]) - 1);
                // Simple triangulation for non-triangle faces
                for (let i = 1; i < idx.length - 1; i++) {
                    tA.push(idx[0] + 1); // Scratch lists are 1-indexed
                    tB.push(idx[i] + 1);
                    tC.push(idx[i+1] + 1);
                    triCount++;
                }
            }
        });

        // Your engine uses item (id * 4) logic. 
        // meshData format based on your 'Combine Matrix' code:
        // [start_vert_index, ?, ?, ?, start_tri_index, ?, ?, end_tri_index]
        // This is a simplified guess based on your pointer logic:
        const meshDataStr = `1\n0\n0\n0\n0\n0\n0\n${triCount}`;

        document.getElementById('outMeshData').value = meshDataStr;
        document.getElementById('outVerts').value = `X: ${vX.join(',')}\n\nY: ${vY.join(',')}\n\nZ: ${vZ.join(',')}`;
        document.getElementById('outTris').value = `A: ${tA.join(',')}\nB: ${tB.join(',')}\nC: ${tC.join(',')}`;
        
        alert("Data Generated! Follow the instructions for each box.");
    };
    reader.readAsText(fileInput.files[0]);
}
</script>
</body>
</html>
