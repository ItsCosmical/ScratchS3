<!DOCTYPE html>
<html>
<head>
    <title>ScratchS3 Conversion</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0d0d0d; color: #00d4ff; text-align: center; padding: 50px; }
        .ui-box { border: 2px dashed #00d4ff; padding: 40px; display: inline-block; border-radius: 20px; background: #1a1a1a; }
        input { margin: 20px; color: white; }
        button { background: #00d4ff; color: #000; border: none; padding: 15px 40px; cursor: pointer; font-weight: bold; border-radius: 5px; }
        #status { margin-top: 20px; font-family: monospace; color: #ffcc00; }
    </style>
</head>
<body>
    <div class="ui-box">
        <h1>CONVERTER</h1>
        <p>Converts ROM to one giant comma-separated TXT</p>
        <input type="file" id="ps3input">
        <br>
        <button onclick="generateTxt()">GENERATE TXT</button>
        <div id="status"></div>
    </div>

    <script>
        async function generateTxt() {
            const fileInput = document.getElementById('ps3input');
            const status = document.getElementById('status');
            if (!fileInput.files.length) return alert("Select a file!");

            const file = fileInput.files[0];
            status.innerText = "Reading file (this may take a while)...";
            
            const buffer = await file.arrayBuffer();
            // Use Uint32Array to get full 4-byte opcodes
            const data32 = new Uint32Array(buffer);
            
            status.innerText = "Converting to string...";
            // Join with commas for easy parsing in Scratch
            const txtContent = data32.join(',');

            status.innerText = "Creating Download...";
            const blob = new Blob([txtContent], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "PS3_DATA_SINGLE.txt";
            a.click();
            
            status.innerText = "DONE";
        }
    </script>
</body>
</html>
