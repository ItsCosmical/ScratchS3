<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scratch 3D Mesh Converter</title>
    <style>
        body { font-family: sans-serif; background: #222; color: #eee; padding: 20px; line-height: 1.5; }
        .container { max-width: 800px; margin: auto; background: #333; padding: 20px; border-radius: 8px; }
        textarea { width: 100%; height: 300px; background: #111; color: #0f0; border: 1px solid #555; font-family: monospace; margin-top: 10px; }
        .controls { margin-bottom: 20px; }
        button { padding: 10px 20px; cursor: pointer; background: #4CAF50; border: none; color: white; border-radius: 4px; }
        input { margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Scratch 3D Mesh Converter</h2>
    <p>Convert .OBJ files to your custom <code>Add Triangle</code> and <code>Add Quad</code> Scratch blocks.</p>
    
    <div class="controls">
        <input type="file" id="fileInput" accept=".obj"><br>
        <label>Material Name: </label>
        <input type="text" id="matName" value="default"><br>
        <label>Scale Factor: </label>
        <input type="number" id="scale" value="1" step="0.1"><br>
        <button onclick="convertObj()">Convert to Scratch Blocks</button>
    </div>

    <textarea id="output" readonly placeholder="Scratch code will appear here..."></textarea>
</div>

<script>
function convertObj() {
    const fileInput = document.getElementById('fileInput');
    const output = document.getElementById('output');
    const mat = document.getElementById('matName').value;
    const scale = parseFloat(document.getElementById('scale').value);

    if (!fileInput.files[0]) {
        alert("Please select an .obj file first!");
        return;
    }

    const reader = new FileReader();
    reader.onload = function(e) {
        const lines = e.target.result.split('\n');
        const verts = [];
        let scratchCode = "define-atomic Load Mesh\n";
        
        lines.forEach(line => {
            const parts = line.trim().split(/\s+/);
            if (parts[0] === 'v') {
                // Vertex: v x y z
                verts.push({
                    x: (parseFloat(parts[1]) * scale).toFixed(3),
                    y: (parseFloat(parts[2]) * scale).toFixed(3),
                    z: (parseFloat(parts[3]) * scale).toFixed(3)
                });
            } else if (parts[0] === 'f') {
                // Face: f v1/vt1/vn1 v2/vt2/vn2 ...
                // We only care about the vertex index (the first number before the slash)
                const indices = parts.slice(1).map(p => parseInt(p.split('/')[0]) - 1);

                if (indices.length === 3) {
                    // Triangle
                    const v1 = verts[indices[0]], v2 = verts[indices[1]], v3 = verts[indices[2]];
                    scratchCode += `Add Triangle at: (${v1.x}) (${v1.y}) (${v1.z}) . (${v2.x}) (${v2.y}) (${v2.z}) . (${v3.x}) (${v3.y}) (${v3.z}) material: (${mat}) BFC? (1) solid? (1) invisible? (0)\n`;
                } else if (indices.length === 4) {
                    // Quad
                    const v1 = verts[indices[0]], v2 = verts[indices[1]], v3 = verts[indices[2]], v4 = verts[indices[3]];
                    scratchCode += `Add Quad at: (${v1.x}) (${v1.y}) (${v1.z}) . (${v2.x}) (${v2.y}) (${v2.z}) . (${v3.x}) (${v3.y}) (${v3.z}) . (${v4.x}) (${v4.y}) (${v4.z}) material: (${mat}) BFC? (1) solid? (1) invisible? (0)\n`;
                }
            }
        });

        output.value = scratchCode;
    };
    reader.readAsText(fileInput.files[0]);
}
</script>

</body>
</html>
