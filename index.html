<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ScratchS3</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0d0d0d; color: #00d4ff; text-align: center; padding: 50px; }
        .ui-box { border: 2px solid #00d4ff; padding: 40px; display: inline-block; border-radius: 20px; background: #1a1a1a; box-shadow: 0 0 20px rgba(0, 212, 255, 0.2); }
        button { background: #00d4ff; color: #000; border: none; padding: 15px 40px; cursor: pointer; font-weight: bold; border-radius: 5px; transition: 0.2s; }
        button:hover { background: #0099bb; }
        input[type="file"] { margin: 20px 0; color: #fff; }
        #status { margin-top: 20px; font-family: monospace; color: #ffcc00; }
        .progress-container { width: 100%; background: #333; border-radius: 10px; margin-top: 20px; display: none; overflow: hidden; }
        #pBar { width: 0%; height: 20px; background: #00d4ff; transition: width 0.1s linear; }
    </style>
</head>
<body>
    <div class="ui-box">
        <h1>ScratchS3</h1>
        <input type="file" id="ps3input">
        <br>
        <button onclick="process()">GENERATE IMPORT FILE</button>
        <div class="progress-container" id="pContainer">
            <div id="pBar"></div>
        </div>
        <div id="status">Ready</div>
    </div>

    <script>
        async function process() {
            const input = document.getElementById('ps3input');
            const status = document.getElementById('status');
            const pBar = document.getElementById('pBar');
            const pContainer = document.getElementById('pContainer');
            
            if (!input.files[0]) return alert("Select a file.");

            const file = input.files[0];
            status.innerText = "Reading Binary...";
            pContainer.style.display = "block";
            pBar.style.width = "0%";

            const buffer = await file.arrayBuffer();
            const data32 = new Uint32Array(buffer);
            const total = data32.length;
            
            const blobs = [];
            const step = 25000; // Chunk size for memory safety
            
            for (let i = 0; i < total; i += step) {
                const chunk = data32.subarray(i, i + step);
                blobs.push(chunk.join('\n') + '\n');
                
                // Update Progress Bar
                if (i % 100000 === 0 || i + step >= total) {
                    const percent = Math.min(((i + step) / total) * 100, 100);
                    pBar.style.width = percent + "%";
                    status.innerText = `Processing: ${Math.round(percent)}%`;
                    await new Promise(r => setTimeout(r, 0)); // Keep UI responsive
                }
            }

            status.innerText = "Finalizing Download...";
            const finalBlob = new Blob(blobs, { type: 'text/plain' });
            const url = URL.createObjectURL(finalBlob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = "IMPORT_TO_SCRATCH.txt";
            a.click();
            
            status.innerText = "DONE!";
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
