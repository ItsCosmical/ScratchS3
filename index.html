<!DOCTYPE html>
<html>
<head>
    <title>ScratchS3 </title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0d0d0d; color: #00ff88; text-align: center; padding: 50px; }
        .ui-box { border: 2px solid #00ff88; padding: 40px; display: inline-block; border-radius: 20px; background: #111; box-shadow: 0 0 20px #00ff8833; }
        button { background: #00ff88; color: #000; border: none; padding: 15px 40px; cursor: pointer; font-weight: bold; border-radius: 5px; margin-top: 20px; }
        #status { margin-top: 20px; font-family: monospace; color: #00ff88; }
        progress { width: 100%; height: 20px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="ui-box">
        <h1>Conversion thing</h1>
        <input type="file" id="ps3input">
        <br>
        <button onclick="process()">Convert to list</button>
        <div id="status">Ready.</div>
        <progress id="pBar" value="0" max="100" style="display:none;"></progress>
    </div>

    <script>
        async function process() {
            const input = document.getElementById('ps3input');
            const status = document.getElementById('status');
            const pBar = document.getElementById('pBar');
            if (!input.files[0]) return;

            const file = input.files[0];
            status.innerText = "Reading Binary...";
            pBar.style.display = "block";

            const buffer = await file.arrayBuffer();
            const data32 = new Uint32Array(buffer);
            const total = data32.length;
            
            status.innerText = "Streaming to Text...";
            
            // We use a Blob strategy with an array of strings to avoid string concatenation lag
            let parts = [];
            let batchSize = 10000; // Process 10k numbers at a time

            for (let i = 0; i < total; i += batchSize) {
                const chunk = data32.subarray(i, i + batchSize);
                parts.push(chunk.join(','));
                
                // Update UI every few batches
                if (i % 100000 === 0) {
                    pBar.value = (i / total) * 100;
                    await new Promise(r => setTimeout(r, 0)); // Yield to UI
                }
            }

            const finalString = parts.join(',');
            const blob = new Blob([finalString], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = "GAME_DATA.txt";
            a.click();
            
            status.innerText = "DONE! File Downloaded.";
            pBar.value = 100;
        }
    </script>
</body>
</html>
