<!DOCTYPE html>
<html>
<head>
    <title>PS3 to Scratch Converter</title>
    <style>
        body { font-family: sans-serif; background: #111; color: #eee; text-align: center; padding: 50px; }
        .box { border: 2px dashed #444; padding: 30px; border-radius: 15px; background: #222; }
        #status { margin-top: 20px; color: #0f0; }
        button { padding: 10px 20px; cursor: pointer; background: #4a90e2; border: none; color: white; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>PS3 ROM → Scratch TXT</h1>
        <p>Select an EBOOT.BIN or ISO (Decrypted)</p>
        <input type="file" id="fileInput"><br><br>
        <label>Chunk Size (Bytes per List): </label>
        <input type="number" id="chunkSize" value="100000"><br><br>
        <button onclick="convertFile()">Convert & Download</button>
        <div id="status"></div>
    </div>

    <script>
        async function convertFile() {
            const fileInput = document.getElementById('fileInput');
            const chunkSize = parseInt(document.getElementById('chunkSize').value);
            const status = document.getElementById('status');
            
            if (!fileInput.files[0]) return alert("Select a file first!");
            
            const file = fileInput.files[0];
            let offset = 0;
            let part = 0;

            status.innerText = "Processing... Check your downloads folder.";

            while (offset < file.size) {
                const chunk = file.slice(offset, offset + chunkSize);
                const buffer = await chunk.arrayBuffer();
                const uint8 = new Uint8Array(buffer);
                
                // Convert bytes to a newline-separated string
                const txtContent = uint8.join('\n');
                const blob = new Blob([txtContent], { type: 'text/plain' });
                
                // Trigger download
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `${file.name}_part${part}.txt`;
                link.click();
                
                offset += chunkSize;
                part++;
                status.innerText = `Downloaded Part ${part}...`;
            }
            status.innerText = "Done! All parts downloaded.";
        }
    </script>
</body>
</html>
