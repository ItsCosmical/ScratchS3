<!DOCTYPE html>
<html>
<head>
    <title>Scratch Mesh String Generator</title>
    <style>
        body { font-family: sans-serif; background: #111; color: #eee; padding: 20px; text-align: center; }
        .box { background: #222; padding: 20px; border-radius: 10px; border: 1px solid #444; display: inline-block; }
        textarea { width: 90vw; height: 200px; margin-top: 10px; background: #000; color: #0f0; border: 1px solid #555; font-family: monospace; word-break: break-all; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Single-String Mesh Converter</h2>
        <input type="file" id="fileInput" accept=".obj"><br><br>
        <button onclick="convert()">Generate Scratch String</button><br>
        <textarea id="output" readonly placeholder="Resulting string will appear here..."></textarea>
    </div>

<script>
function convert() {
    const file = document.getElementById('fileInput').files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        const lines = e.target.result.split('\n');
        let v = [], f = [];
        
        lines.forEach(line => {
            const p = line.trim().split(/\s+/);
            if (p[0] === 'v') v.push(`${p[1]},${p[2]},${p[3]}`);
            if (p[0] === 'f') {
                const idx = p.slice(1).map(x => x.split('/')[0]);
                for (let i = 1; i < idx.length - 1; i++) {
                    f.push(`${idx[0]},${idx[i]},${idx[i+1]}`);
                }
            }
        });

        // Format: vCount | v1,v2... | f1,f2...
        const meshString = `${v.length}|${v.join(',')}|${f.join(',')}`;
        document.getElementById('output').value = meshString;
    };
    reader.readAsText(file);
}
</script>
</body>
</html>
